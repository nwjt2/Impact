# Source registry.
#
# The scraper fleet feeds the three slot JSONs:
#
#   slot 1 — Peer INGO Funds        (peer_ingo_funds.json)
#   slot 2 — DFI → INGO-GP commits  (dfi_ingo_commits.json)
#   slot 3 — Deadlines              (deadlines.json)
#
# `slots:` is an informational tag on each source — a list of integers
# indicating which slot(s) the scraper's output enriches. Used by
# scrapers/run.py stats and by the health page.
#
# `status:` is `active` (default) or `parked`. Parked sources are skipped
# by run.py — their config survives in-tree so re-activation is a
# one-line change. Self-heal policy: park anything that needs more than
# ~5 minutes of fixing and walk away.
#
# Fields:
#   id, name, url, type, content_type, expected_minimum_cadence_days,
#   jurisdiction_tag, validation_status, break_token, html_selectors,
#   api_params

