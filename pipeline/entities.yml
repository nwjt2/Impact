# Entity-match library used for scraper-output enrichment and peer-fund
# cross-referencing.
#
# ~150 entries across three sections (target_lps, regulators, peer_ingos).
# Cross-referenced against content/peer_funds.yml for slot 1.
#
# Match on `aliases` (list) for any entry.
#
# ---- Schema ----
#
# target_lps: (named LPs a typical INGO-GP fund-raise will approach)
#   - name:                  canonical display string
#     aliases:               [list; include legal name, common short form, ticker-ish abbr]
#     sector_tags:           [climate, health, agri, edu, fi, wash, gender, housing, energy, smb, generalist]
#     geo_tags:              [africa, latam, asia, mena, global, us, eu, uk]
#     lp_type:               dfi | foundation | family_office | corp_impact
#     typical_ticket_usd_m:  "5-25" style string (low-high), estimator only
#     public_newsroom_url:   best-guess URL; manually validated
#     first_pass_cadence_days: integer; how often we'd expect a new LP-press item
#
# regulators: (for M6 jurisdiction filtering)
#   - name:              canonical display string
#     aliases:           [list]
#     jurisdiction:      ISO-2 country code (or "EU")
#     regulator_type:    charity | securities | tax | corporate_registry | prudential
#     rss_or_news_url:   best-guess URL; engineer validates
#
# peer_ingos: (parent INGO names for M3 cross-ref + peer-close context)
#   - name:                canonical display
#     aliases:             [list: legal, short, abbr]
#     parent_jurisdictions: [ISO-2 list]
#     sector_tags:         [list]
#     fund_vehicle_name:   nullable string (e.g. "Mercy Corps Ventures" for Mercy Corps)

