# Cooperative-NGO LP registry — INGOs, farmer cooperatives, faith-based
# orgs, trade unions, and university endowments appearing as LPs in peer
# impact funds.
#
# Source of truth for the /cooperative-ngos/ page. Hand-curated.
#
# A large share of these are the Belgian agri-coop / fair-trade cluster
# (Boerenbond, MRBB, Rikolto, Trias, vdk-bank, SOS Faim, Oxfam-Solidarité,
# Broederlijk Delen, Louvain Coopération, KU Leuven, ACV-CSC Metea) that
# co-anchor a small set of vehicles like Kampani, Truvalu, and BRS
# Microfinance Coop. Geography skews EU-Belgian.
#
# Honest-null discipline:
#   - Impact theses for these LPs are usually mission-statement level
#     rather than fund-LP-strategy level. Rich fields will be sparse.
#   - INGOs LP'ing into other INGOs' funds is the unusual pattern this
#     registry surfaces (CARE Enterprises, Oxfam, Pathfinder, Solidaridad).
#     Worth tracking but treat as a different signal from foundation LP
#     activity.
#
# category enum:
#   ngo                       International NGO acting as fund LP
#                             (CARE Enterprises, Oxfam, Pathfinder, Solidaridad,
#                              Broederlijk Delen, MEDA, SOS Faim, Trias, Rikolto)
#   farmer_coop               Farmer / producer cooperative or coop holding
#                             (Boerenbond, MRBB, CLAC)
#   trade_union               Trade-union / labour-movement entity
#                             (ACV-CSC Metea, Uniting Financial Services)
#   university_endowment      University endowment LP (KU Leuven, Louvain Coopération)
#   faith_based               Faith-based / mission organisation
#   development_consultancy   Development consultancy (Chemonics) — included
#                             because it appears as fund LP in scraped data

