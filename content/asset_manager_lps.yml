# Asset-manager LP registry — dedicated impact AMs, MIVs (microfinance
# investment vehicles), and mainstream AMs with impact verticals that
# appear as LPs in peer impact funds.
#
# Source of truth for the /asset-managers/ page. Hand-curated.
#
# Honest-null discipline:
#   - Many MIVs publish detailed impact reports; mainstream AMs typically
#     don't disclose at the fund-LP level. Expect mixed coverage on
#     stated_priority_themes / stated_geo_focus / typical_check_usd_m.
#   - aum_usd_m is the *impact-vertical* AUM where disclosed; otherwise
#     null even if the parent firm publishes total AUM (mixing the two
#     would mislead).
#   - known_ingo_gp_commits is empty until each commit is independently
#     traced to a public source.
#
# category enum:
#   dedicated_impact            Impact mandate is the firm's primary business
#                               (Symbiotics, Triple Jump, ImpactAssets, BlueOrchard, responsAbility)
#   mfi_specialist              Microfinance investment vehicle / specialist lender
#                               (Incofin, Alterfin, SIDI, Oikocredit-like)
#   platform                    DAF / impact-platform host (CapShift, ImpactAssets)
#   mainstream_with_impact_arm  Conventional AM with an impact / sustainability vertical
#                               (Nuveen, AXA IM, Impax, TIAA)
#
# Several entities here are also fund managers in network/catalogue/
# impact_funds.csv — they appear as LPs because of fund-of-funds structures
# or cross-vehicle commitments. The fund-side and LP-side views are
# intentionally distinct; do not collapse.

