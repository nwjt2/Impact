      education enterprises in West Africa (Côte d'Ivoire, Ghana, Benin,
      Burkina Faso, Chad, Mali, Niger) and MENA (Egypt, Jordan, Lebanon,
      Tunisia, OPT). First close December 2021 with CHF 6m joint anchor
      commitment from Jacobs Foundation and the Swiss Agency for
      Development and Cooperation (SDC). Sits under the Impact-Linked
      Finance Fund (ILFF) Stichting umbrella, co-managed by iGravity
      and Roots of Impact. Surfaces Jacobs Foundation as a foundation
      LP on /network/.

