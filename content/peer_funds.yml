# Peer impact funds registry.
#
# ~50 entries, enriched with anchor LP, close dates, disclosed economics
# (fees/carry/hurdle/GP commit/investment period), sub-advisor + placement
# agent, parent-INGO country, and public source URL.
#
# Consumed by:
#   - Slot 1: "INGOs like you that closed a fund"  (filter by parent_ingo_country; INGO-sponsored entries only)
#   - Slot 2: cross-reference via fund_slug from content/dfi_ingo_commitments.yml
#
# Schema per entry:
#   slug:                                URL-stable kebab-case id (UNIQUE). Handshake key for dfi_ingo_commitments.yml.
#   name:                                canonical display string
#   manager:                             fund manager legal entity (who actually runs the vehicle)
#   parent_ingo:                         nullable; INGO sponsor if any (null = non-INGO comparable)
#   parent_ingo_country:                 ISO-2 of parent INGO HQ (null if no parent INGO)
#   vintage:                             integer year of first close (or announcement if not yet closed)
#   size_usd_m:                          nullable integer or string "TBD"
#   sector_tags:                         [list]
#   geo_tags:                            [list]
#   vehicle_type:                        closed_end_fund | evergreen | blended | DIB
#   first_close_date:                    YYYY-MM-DD or null
#   final_close_date:                    YYYY-MM-DD or null
#   timeline_days_announce_to_first_close: integer or null (computed at emit time; left null where announce date not public)
#   anchor_lp:                           named anchor commitment (free string) or null
#   mgmt_fee_bps:                        integer basis points (e.g. 175 = 1.75%) or null. DO NOT FABRICATE.
#   carry_pct:                           float carried interest % (e.g. 15.0) or null
#   hurdle_pct:                          float preferred return % (e.g. 8.0) or null
#   gp_commit_pct:                       float GP commitment as % of fund size or null
#   investment_period_years:             integer years or null
#   sub_advisor:                         named sub-advisor firm or null
#   placement_agent:                     named placement agent or null
#   status:                              raising | deployed | wound_down
#   public_source_url:                   link to press release / fund page / annual report
#   last_seen_at:                        YYYY-MM-DD — today's date for entries updated this round
#   notes:                               <=2 factual sentences
#
# Honesty requirement:
#   If a field is not in the public record, it MUST be null. A blank field
#   is infinitely more valuable than a made-up one. A fabricated 175 bps /
#   15% carry will contaminate any aggregation and make the product dishonest.
#
# Reality: mgmt_fee_bps, carry_pct, hurdle_pct, gp_commit_pct, and
# investment_period_years are rarely disclosed for INGO-sponsored vehicles.
# Expect the disclosure rate to be low (maybe 15-25%) on the INGO side.
# Engineer: surface sample size + disclosure rate prominently in slot 4.

peer_funds:

