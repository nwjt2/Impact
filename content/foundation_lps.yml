# Foundation LP registry — parallel to content/dfi_ingo_commitments.yml.
#
# Source of truth for the /foundations/ page. Hand-curated.
#
# Honest-null discipline:
#   - aum_usd_m left null where not confirmed via primary public materials
#     (foundation site / 990s / annual report). Where set, aum_usd_m_year
#     records the disclosure date so readers can judge staleness.
#   - pri_program / mri_program null where existence cannot be verified
#     in public materials. Default-false-with-note hides the section in
#     the UI; explicit-true-with-program-name+url surfaces it.
#   - known_ingo_gp_commits is empty until each commit is traced to a
#     public source (mirrors the DFI commitments discipline).
#
# Sectors / geos / typical-check ranges are sourced from the corresponding
# entry in pipeline/entities.yml (curated metadata).

