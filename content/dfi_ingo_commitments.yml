# ---------- Per-DFI stated preferences and emerging-manager facilities ----------
#
# Scope: DFIs with publicly-stated thesis pages. Unknown fields = null.
# Named contacts: included ONLY where a named human is in a public press
# release; otherwise empty list (do not scrape LinkedIn).

dfi_profiles:

  - dfi_slug: bii
    dfi_name: British International Investment
    stated_sector_preferences: [climate, gender_lens, fi, energy, agri]
    stated_geo_focus: [africa, asia]
    # 2026-05-03 freshness pass: WebFetch returned 403 (likely bot/geo block);
    # Google site-search confirms URL is still the canonical BII portfolios
    # page and is indexed. Not bumping last_seen_at — direct re-fetch could
    # not confirm content. Try a browser/scraper-with-UA on next deep pass.
    stated_thesis_url: https://www.bii.co.uk/en/about/our-company/investment-portfolios/
    stated_thesis_excerpt: null
    known_contacts_public: []
    typical_ticket_usd_m_min: 5
    typical_ticket_usd_m_max: 50
    last_seen_at: 2026-04-25
    emerging_manager_facility:
      exists: true
      program_name: Kinetic Portfolio
      application_url: https://www.bii.co.uk/en/about/our-company/investment-portfolios/kinetic/
      notes: |
        BII's Kinetic Portfolio (introduced ~2021) is the catalytic
        capital arm — higher risk tolerance than BII's Growth and
        Catalyst portfolios. Three facilities: Climate Innovation
