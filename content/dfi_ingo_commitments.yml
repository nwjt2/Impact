# DFI -> INGO-GP fund commitments registry.
#
# Source of truth for slot 2 ("Which DFIs fund INGO-GPs, and what do they
# look for"). Hand-curated. Scrapers append as new commitments are announced.
#
# Two top-level lists:
#   - commitments: named DFI commitments to INGO-sponsored funds
#   - dfi_profiles: per-DFI stated sector/geo preferences + emerging-manager
#     facility signals
#
# Handshake keys (enforced at pipeline startup):
#   - fund_slug MUST match a slug in content/peer_funds.yml
#   - dfi_slug  MUST match a target_lps entry in pipeline/entities.yml
#     (matched by name or alias; see `_dfi_slug_mapping` below)
#
# DFI slug convention:
#   - Lower-case, kebab-case
#   - Typically the first alias in entities.yml target_lps.aliases, lowercased
#   - For DFIs where no natural short form exists, use a descriptive slug
#
# Honesty requirement:
#   If a commitment cannot be traced to a public press release or annual
#   report, it MUST NOT be in this file. commit_usd_m = null when the press
#   release announced the commitment but did not disclose the amount — this
#   is common for DFI-INGO-fund commitments where the fund's LPA has
#   confidentiality clauses.

_dfi_slug_mapping:
  # Documentation only — pipeline enforces these matches against entities.yml
  bii: British International Investment
  fmo: FMO
  dfc: U.S. International Development Finance Corporation
  proparco: Proparco
  norfund: Norfund
  finnfund: Finnfund
  ifc: IFC Asset Management / AIP
  swedfund: Swedfund
  deg: DEG
  findev-canada: FinDev Canada
  kfw: KfW Development Bank
  afd: AFD
  eib: European Investment Bank
  gcf: Green Climate Fund
  cif: Climate Investment Funds
  bio-invest: BIO Invest
  sifem: SIFEM
  ebrd: EBRD
  idb-invest: IDB Invest
  jica: JICA

