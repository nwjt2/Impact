# ---------- Per-DFI stated preferences and emerging-manager facilities ----------
#
# Scope: DFIs with publicly-stated thesis pages. Unknown fields = null.
# Named contacts: included ONLY where a named human is in a public press
# release; otherwise empty list (do not scrape LinkedIn).

dfi_profiles:

  - dfi_slug: bii
    dfi_name: British International Investment
    stated_sector_preferences: [climate, gender_lens, fi, energy, agri]
    stated_geo_focus: [africa, south-asia]
    stated_thesis_url: https://www.bii.co.uk/en/about/our-company/investment-portfolios/
    stated_thesis_excerpt: null
    known_contacts_public: []
    typical_ticket_usd_m_min: 5
    typical_ticket_usd_m_max: 50
    last_seen_at: 2026-04-25
    emerging_manager_facility:
      exists: true
      program_name: Kinetic Portfolio
      application_url: https://www.bii.co.uk/en/about/our-company/investment-portfolios/kinetic/
      notes: |
        BII's Kinetic Portfolio (introduced ~2021) is the catalytic
        capital arm — higher risk tolerance than BII's Growth and
        Catalyst portfolios. Three facilities: Climate Innovation
        Facility (£240m FCDO seed), Mobilization Facility, and a third
        catalytic facility. Open to first/second-time GPs only via
        BII direct LP conversation; no public application form.
        Status update: thesis_url updated from /en/our-impact/ (403)
        to /en/about/our-company/investment-portfolios/.

  - dfi_slug: fmo
    dfi_name: FMO
    stated_sector_preferences: [fi, energy, agri]
    stated_geo_focus: [africa, asia, latam]
    stated_thesis_url: https://www.fmo.nl/strategy
    stated_thesis_excerpt: "Our Pioneer-Develop-Scale strategy towards 2030 will maximize what we as a development finance institution can contribute to a world in which all people live well, within the boundaries of our planet."
    known_contacts_public: []
    typical_ticket_usd_m_min: 10
    typical_ticket_usd_m_max: 40
    last_seen_at: 2026-04-25
    emerging_manager_facility:
      exists: true
      program_name: MASSIF
      application_url: https://www.fmo.nl/partner-with-us/massif
      notes: |
        MASSIF is FMO's financial-inclusion fund managed on behalf of
        the Dutch government. Invests in seed capital, local-currency
        debt, mezzanine, equity, and investment funds — the most
        accessible FMO entry point for an INGO-sponsored MFI vehicle
        or first-time emerging manager. Three SDG focus: 8 (jobs), 10
        (inequality), 13 (climate).

  - dfi_slug: dfc
    dfi_name: U.S. International Development Finance Corporation
    stated_sector_preferences: [health, energy, fi, agri, gender_lens]
    stated_geo_focus: [global]
    stated_thesis_url: https://www.dfc.gov/what-we-offer/our-products
    stated_thesis_excerpt: null
    known_contacts_public: []
    typical_ticket_usd_m_min: 10
    typical_ticket_usd_m_max: 100
    last_seen_at: 2026-04-25
    emerging_manager_facility:
      exists: true
      program_name: 2X Women's Initiative
      application_url: https://www.dfc.gov/our-work/2x-womens-initiative
      notes: |
        DFC offers two products to fund managers: debt support and
        equity support for private equity funds. Categorized under
        "Platforms and Funds." 2X facility is the most accessible DFC
        pathway for INGO-sponsored gender-lens funds; typically requires
        commercial-anchor co-investment.

