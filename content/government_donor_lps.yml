# Government & bilateral-donor LP registry — bilateral aid agencies and
# sovereign governments appearing as LPs in peer impact funds.
#
# Source of truth for the /government-donors/ page. Hand-curated.
#
# Honest-null discipline:
#   - Bilateral donors publish development-cooperation strategies that are
#     usually country-and-sector specific. Mapping those to fund-LP
#     thesis fields is approximate; left null unless the donor explicitly
#     publishes an impact-fund LP allocation strategy.
#   - Sovereign governments here usually LP into ONE specific INGO-sponsored
#     vehicle as a domestic-policy or post-conflict transition initiative,
#     not as part of a standing allocation strategy. The fact of the LP
#     commitment is captured in network LP edges; this registry adds
#     country and program context.
#   - known_ingo_gp_commits is empty until each commit is independently
#     traced to a public source.
#
# category enum:
#   bilateral_aid       Bilateral / development-cooperation agency funded
#                       from a national aid budget (USAID, BMZ, DFAT,
#                       Swiss Dev Coop, Global Affairs Canada).
#   multilateral_eu     EU institution acting as a fund LP.
#   multilateral_un     UN agency acting as a fund LP.
#   sovereign_lp        Sovereign government LP'ing directly into a fund
#                       (often a post-conflict / trust-fund vehicle).

