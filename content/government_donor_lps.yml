# Government & bilateral-donor LP registry — bilateral aid agencies and
# sovereign governments appearing as LPs in peer impact funds.
#
# Source of truth for the /government-donors/ page. Hand-curated.
#
# Honest-null discipline:
#   - Bilateral donors publish development-cooperation strategies that are
#     usually country-and-sector specific. Mapping those to fund-LP
#     thesis fields is approximate; left null unless the donor explicitly
#     publishes an impact-fund LP allocation strategy.
#   - Sovereign governments here usually LP into ONE specific INGO-sponsored
#     vehicle as a domestic-policy or post-conflict transition initiative,
#     not as part of a standing allocation strategy. The fact of the LP
#     commitment is captured in network LP edges; this registry adds
#     country and program context.
#   - known_ingo_gp_commits is empty until each commit is independently
#     traced to a public source.
#
# category enum:
#   bilateral_aid       Bilateral / development-cooperation agency funded
#                       from a national aid budget (USAID, BMZ, DFAT,
#                       Swiss Dev Coop, Global Affairs Canada).
#   multilateral_eu     EU institution acting as a fund LP.
#   multilateral_un     UN agency acting as a fund LP.
#   sovereign_lp        Sovereign government LP'ing directly into a fund
#                       (often a post-conflict / trust-fund vehicle).

government_donors:

  - slug: australian-department-of-foreign-affairs-and-trade-dfat
    name: Australian Department of Foreign Affairs and Trade (DFAT)
    aliases: ["DFAT", "Australian Department of Foreign Affairs and Trade"]
    country: "AU"
    category: bilateral_aid
    stated_priority_themes: [climate, gender_lens, health, smb]
    stated_geo_focus: [asia]
    stated_thesis_url: https://www.dfat.gov.au/publications/development/australias-international-development-policy
    stated_thesis_excerpt: null
    typical_check_usd_m_min: null
    typical_check_usd_m_max: null
    public_newsroom_url: https://www.dfat.gov.au/news/media-releases
    last_seen_at: 2026-05-04
    known_ingo_gp_commits: []
    notes: |
      Australia's bilateral aid agency. 75% of 2025-26 development
      assistance directed to the Indo-Pacific. Headline 2025-26
      packages: AUD 1bn economic resilience, AUD 355m climate action,
      AUD 81m regional health resilience. Stated themes: climate
      action / energy transition (incl. KINETIK Indonesia partnership),
      economic development, gender equality and inclusion, locally led
      development. Direct WebFetch verification timed out on 2026-05-04;
      thesis populated from DFAT-published documents (Indonesia 2024-2028
      partnership plan, Southeast Asia 2024-2028 plan).

  - slug: european-union
    name: European Union
    aliases: ["European Union", "EU", "European Commission", "DG INTPA"]
    country: "EU"
    category: multilateral_eu
    stated_priority_themes: [climate, energy, health, gender_lens, edu]
    stated_geo_focus: [africa, global]
    stated_thesis_url: https://international-partnerships.ec.europa.eu/policies/global-gateway_en
    stated_thesis_excerpt: "The EU addresses global challenges through international partnerships that uphold and promote European values and interests, and contribute to peace and prosperity in the world."
    typical_check_usd_m_min: null
    typical_check_usd_m_max: null
    public_newsroom_url: https://international-partnerships.ec.europa.eu/news-and-events/news_en
    last_seen_at: 2026-05-04
    known_ingo_gp_commits: []
    notes: |
      EU LP commitments typically flow through DG INTPA (formerly DEVCO)
      or the EFSD+ blending facilities. Global Gateway is the headline
      initiative. Africa-EU Partnership is the prominent geographic
      priority on the policy landing page; explicit Asia/LATAM coverage
      is via specific country/regional programs.

  - slug: german-federal-ministry-for-economic-cooperation-and-development-bmz
    name: German Federal Ministry for Economic Cooperation and Development (BMZ)
    aliases: ["BMZ", "German Federal Ministry for Economic Cooperation and Development",
             "Bundesministerium für wirtschaftliche Zusammenarbeit und Entwicklung"]
    country: "DE"
    category: bilateral_aid
    stated_priority_themes: [climate, agri, edu, health]
    stated_geo_focus: [africa]
    stated_thesis_url: https://www.bmz.de/en/issues
    stated_thesis_excerpt: null
    typical_check_usd_m_min: null
    typical_check_usd_m_max: null
    public_newsroom_url: https://www.bmz.de/en/news/press-releases
    last_seen_at: 2026-05-04
    known_ingo_gp_commits: []
    notes: |
      Germany's federal development ministry. Thematic priorities include
      climate action / international climate finance, food security,
      education, health cooperation, development-oriented migration.
      Geographic priorities centre on Africa with significant MENA and
      Ukraine reconstruction commitments. Many LP commitments are
      executed via KfW (tracked separately as a DFI).

  - slug: global-affairs-canada
    name: Global Affairs Canada
    aliases: ["Global Affairs Canada", "GAC"]
    country: "CA"
    category: bilateral_aid
