    notes: |
      Canada's foreign affairs and development ministry. Operates under
      the Feminist International Assistance Policy. Headline themes:
      gender equality, climate change, human rights / democracy /
      governance. Geographic priorities are thematic rather than
      regionally fixed.

  - slug: international-trade-centre
    name: International Trade Centre
    aliases: ["International Trade Centre", "ITC"]
    country: "CH"
    category: multilateral_un
    stated_priority_themes: [smb, gender_lens]
    stated_geo_focus: [africa, asia, latam]
    stated_thesis_url: https://www.intracen.org/our-work/projects/shetrades
    stated_thesis_excerpt: "Increase the participation of women entrepreneurs in international trade."
    typical_check_usd_m_min: null
    typical_check_usd_m_max: null
    public_newsroom_url: https://www.intracen.org/news-and-events
    last_seen_at: 2026-05-04
    known_ingo_gp_commits: []
    notes: |
      Joint UN-WTO agency, Geneva HQ. SheTrades is the flagship women-and-
      trade programme — connected 3m+ women entrepreneurs to markets by
      end-2021, runs 19 in-country and 2 regional hubs across Africa, Asia,
      LATAM/Caribbean, and MENA. Cross-cutting themes: SME export
      competitiveness, women in trade, youth and trade (Youth and Trade /
      REMI initiatives focused on Leave-No-One-Behind groups). Direct
      WebFetch verification was blocked (403 WAF) on 2026-05-04; thesis
      sourced from ITC's own SheTrades programme pages.

  - slug: swiss-agency-for-development-and-cooperation
    name: Swiss Agency for Development and Cooperation
    aliases: ["SDC", "Swiss Agency for Development and Cooperation",
             "Direktion für Entwicklung und Zusammenarbeit", "DEZA"]
    country: "CH"
    category: bilateral_aid
    stated_priority_themes: [climate, smb, gender_lens, health]
    stated_geo_focus: [africa, asia]
    stated_thesis_url: https://www.eda.admin.ch/en/international-cooperation-ic-strategy-2025-28
    stated_thesis_excerpt: null
    typical_check_usd_m_min: null
    typical_check_usd_m_max: null
    public_newsroom_url: https://www.eda.admin.ch/sdc/en/home/news.html
    last_seen_at: 2026-05-04
    known_ingo_gp_commits: []
    notes: |
      Switzerland's bilateral development cooperation agency. The
      2025-2028 International Cooperation Strategy sets four objectives:
      (1) human development (saving lives, basic services); (2)
      sustainable economic development (decent jobs, dynamic local
      economy and private sector); (3) climate and environment; (4)
      peace and governance. CHF 11.27bn total guarantee credits;
      CHF 1.5bn earmarked for Ukraine, CHF 1.6bn for climate. Four
      priority regions retained: sub-Saharan Africa, MENA, Asia,
      Eastern Europe. 40 priority countries plus 7 protracted crises.
      Direct WebFetch was blocked (403 WAF) on 2026-05-04; thesis
      verified via SDC's own published strategy.

