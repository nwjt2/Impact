# Pension-fund LP registry — public, corporate, and industry pension
# funds appearing as LPs in peer impact funds.
#
# Source of truth for the /pension-funds/ page. Hand-curated.
#
# Honest-null discipline:
#   - Pension funds disclose total AUM but rarely disclose impact-vertical
#     allocations or per-LP commitments. Coverage on stated_priority_themes
#     and typical_check_usd_m will be sparse.
#   - The fact of an LP commitment is captured in the network LP edges.
#     This registry adds beneficiary-base, governance, and stated thesis
#     where disclosed.
#   - known_ingo_gp_commits is empty until each commit is independently
#     traced to a public source.
#
# category enum:
#   public               Civil-service / sovereign pension scheme (CalPERS, ABP)
#   corporate            Corporate-sponsored pension fund (KBC Pensioenfonds)
#   industry_collective  Multi-employer / sectoral collective (APG, PGGM, SPF, SPOV)

pension_funds:

