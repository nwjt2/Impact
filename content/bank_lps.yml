# Bank LP registry — banks acting as fund LPs into peer impact funds.
#
# Source of truth for the /banks/ page. Hand-curated.
#
# Honest-null discipline (parallel to content/foundation_lps.yml):
#   - aum_usd_m_consolidated, stated_thesis_url, stated_priority_themes,
#     stated_geo_focus, typical_check_usd_m_min/max are null where not
#     verifiable in primary public sources (annual report, sustainability
#     report, dedicated impact-finance landing page).
#   - Banks rarely publish stated impact theses for their LP commitments.
#     Expect heavy null coverage on theme/geo/check-size fields. The fact
#     of an LP commitment is captured in the network LP edges
#     (network/dashboard_prep/fund_lps.csv); this registry adds the
#     above-the-line context.
#   - known_ingo_gp_commits is empty until each commit is independently
#     traced to a public source.
#
# category enum:
#   cooperative          Member-owned (Rabobank, Crédit Coopératif, vdk bank, Banca Etica)
#   commercial           Standard listed commercial bank
#   development_oriented Bank with explicit development-finance mandate
#   investment_bank      Wholesale / IB
#
# Schema per entry mirrors foundation_lps.yml where possible.

