  # one_off entry with next_occurrence 2026-01-01 (Q1 2026 adoption window)
  # is now history. Templates are in production use across the industry;
  # new INGO funds simply default to the 2025 template package. No live
  # forward deadline remains. Source page (ilpa.org/news/...-template-...)
  # still resolves but is no longer a forward signal.

  - deadline_id: ilpa-principles-revision-watch
    issuing_body: Institutional Limited Partners Association (ILPA)
    country: US
    kind: template_revision
    title: ILPA Principles & templates — revision watch
    deadline_date: null
    recurring: rolling
    why_it_matters: |
      ILPA Principles 3.0 (June 2019) remains canonical as of 2026-05-03;
      no Principles 4.0 announced. (The 2026 Reporting + Performance
      Template launch went live Q1 2026 and was dropped from this
      registry as past one-off — see comment block above.) LPs
      increasingly cite ILPA in term-sheet negotiations; an LPA drafted
      against out-of-date ILPA will draw immediate LP questions.
    public_source_url: https://ilpa.org/resources/
    last_verified_at: 2026-05-03

  - deadline_id: iris-plus-release-watch
    issuing_body: Global Impact Investing Network (GIIN) / IRIS+
    country: US
    kind: template_revision
    title: IRIS+ thematic taxonomy releases
    deadline_date: null
    recurring: rolling
    why_it_matters: |
      IRIS+ publishes new thematic taxonomies on an irregular cadence
      (GIIN says "every two to five years"). Most recent surfaced theme:
      "Waste Management & Circularity" (date not given on the live page).
      Your impact framework should cite the current IRIS+ thematic
      taxonomy; outdated references read as un-serious to institutional
      LPs.
    public_source_url: https://iris.thegiin.org/
    last_verified_at: 2026-05-03

  # 2026-05-03: ifc-ps-sustainability-framework-update dropped.
  # one_off entry with next_occurrence 2026-04-01 (Phase II opening) is
  # now past, and Phase II has NOT actually opened — IFC's official update
