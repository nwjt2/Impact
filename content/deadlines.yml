# Deadlines registry for slot 3 ("Deadlines that matter").
#
# Hand-curated seed. Scrapers refresh deadline_date fields and append new
# RFPs as they surface.
#
# Scope:
#   - DFI open-call / RFP / emerging-manager facility application windows
#   - DFI board / investment-committee meeting public calendars
#   - ILPA / IRIS+ / IFC PS / OPIM / SFDR template revision releases
#   - Regulator-specific INGO-to-fund-manager filings with public deadlines
#
# Schema:
#   deadline_id:         kebab-case id, unique
#   issuing_body:        who owns the deadline
#   country:             ISO-2 of the issuing body (not the applicant)
#   kind:                rfp | open_call | rolling_application | board_meeting | template_revision | regulator_filing | conference_deadline
#   title:               display string
#   deadline_date:       YYYY-MM-DD or null (null = rolling / continuous / quarterly-with-no-fixed-date / unknown-next-date)
#   recurring:           null | annual | quarterly | biennial | rolling | one_off
#   next_occurrence:     YYYY-MM-DD or null — curated best-guess of the NEXT cycle start/open date; use when
#                        the current deadline has passed but the cycle repeats, or to forward-signal a window open.
#                        Populate only when the source STATES the date; never guess from cadence.
#   why_it_matters:      single sentence, INGO-first-close framing
#   public_source_url:   the actual page where the deadline is published
#   last_verified_at:    YYYY-MM-DD
#
# Honesty requirement:
#   If I don't have a credible deadline_date in public record, deadline_date
#   is null AND recurring carries the pattern (e.g. "quarterly") so the UI
#   can show "Rolling — check link" rather than invent a date. A fictitious
#   RFP date is worse than a short list.
#
# Reality check: most DFI open calls are either continuously rolling or
# announced with short notice. Most of what's useful here is the LINK to
# the facility page plus a reminder pattern, not a fixed date.

deadlines:

  # ---------- DFI emerging-manager facility application pages ----------

  - deadline_id: bii-kinetic-rolling
    issuing_body: British International Investment
    country: GB
    kind: rolling_application
    title: BII Kinetic — Catalytic Portfolio (rolling)
    deadline_date: null
    recurring: rolling
    why_it_matters: |
      BII's Kinetic Portfolio is the catalytic-capital sleeve alongside
      Growth and Catalyst; higher risk tolerance, blends with other
      capital sources. Most INGO-aligned DFI entry point in the UK.
      No public fixed window — Kinetic intake is engagement-based, not
      RFP-based. (BII did run a Mercer-partnered Mobilisation Facility
      RFP that closed 4 March 2025 — now past. No 2026 successor RFP
      announced as of verification date.)
    public_source_url: https://www.bii.co.uk/en/about/our-company/investment-portfolios/kinetic/
    last_verified_at: 2026-05-03

  - deadline_id: ifc-amc-aip-rolling
    issuing_body: IFC Asset Management Company
    country: US
    kind: rolling_application
    title: IFC Asset Management Company — emerging-market fund commitments
    deadline_date: null
    recurring: rolling
    why_it_matters: |
      IFC AMC manages institutional capital invested in IFC's emerging-
      markets pipeline; 16 funds closed and over $10bn raised per the
      current site. The "Accelerator Investment Platform" label inherited
      from the seed is no longer surfaced on the live site — current
      framing is generic emerging-markets fund-of-funds. Engagement is
      direct, not via posted RFP; begin conversation 18 months before
      first close.
    public_source_url: https://www.ifcamc.org/
    last_verified_at: 2026-05-03

  # 2026-04-28: dfc-2x-women-rolling removed. The public 2X page
  # (dfc.gov/our-work/2x-womens-initiative) now returns 403 / "not
  # authorized" and the 2X menu link is gone from dfc.gov. Program
  # itself is still Congressionally authorized (FY26 NDAA, 18 Dec 2025)
  # but no public application surface remains, so listing it as a
  # rolling open application would be misleading. Engagement is direct
  # deal-team only — captured on the DFC card in dfi_ingo_commitments.yml.

  - deadline_id: dfc-climate-funds-rolling
    issuing_body: U.S. International Development Finance Corporation
    country: US
    kind: rolling_application
    title: DFC Climate-Focused Investment Funds — call for applications (rolling)
    deadline_date: null
    recurring: rolling
    why_it_matters: |
      DFC's open call for climate funds targets vehicles capitalized at
      $100m+ with DFC tickets $10-400m (≤20% of fund). Source confirms:
      "DFC will review proposals on a rolling-basis and will continue to
      collect submissions indefinitely." Original press release dates to
      April 2021 but rolling language remains live. DFC reauthorised
      through 2031 in FY2026 NDAA — call remains operationally relevant.
    public_source_url: https://www.dfc.gov/media/press-releases/dfc-announces-call-applications-climate-focused-investment-funds
    last_verified_at: 2026-05-03

  - deadline_id: dfc-direct-equity-rolling
    issuing_body: U.S. International Development Finance Corporation
    country: US
    kind: rolling_application
    title: DFC Direct Equity — Request for Applications (rolling)
    deadline_date: null
    recurring: rolling
    why_it_matters: |
      Parallel DFC rolling intake for direct equity into emerging-market
      operating companies (not funds), with priority for 2X, Prosper
      Africa, América Crece, Indo-Pacific themes. Source: "OEI will
      review proposals on a rolling-basis and will continue to collect
      submissions indefinitely." Relevant for INGOs whose vehicle is
      direct-investment rather than a pooled fund. FY2026 NDAA also
      authorises a $5bn equity revolving fund at Treasury — equity
      window now structurally larger.
    public_source_url: https://www.dfc.gov/media/press-releases/dfc-announces-direct-equity-request-applications
    last_verified_at: 2026-05-03

  - deadline_id: gcf-accredited-entity-prescreen-2026-w2
    issuing_body: Green Climate Fund
    country: KR
    kind: open_call
    title: GCF Accredited Entity — pre-screening for 2026 W2 window
    deadline_date: 2026-05-27
    recurring: biennial
    next_occurrence: 2026-07-15
    why_it_matters: |
      Multi-year credentialing pathway that gates access to GCF anchor-
      LP commitments. Source quote (live 2026-05-03 on /accreditation/
      pre-screening): "pre-screening submissions received by 27 May 2026
      (11:59 PM KST) may be considered for the second 2026 accreditation
      application window, which will open on 15 July 2026 (08:00 AM KST)."
      Each window runs 2 months; then ~9-month review. Begin AE process
      18-24 months pre-first-close.
    # 2026-05-03: re-sourced from /accreditation/process to /accreditation/
    # pre-screening; the original /process page no longer surfaces specific
    # window dates. /pre-screening currently carries the verbatim quote.
    public_source_url: https://www.greenclimate.fund/accreditation/pre-screening
    last_verified_at: 2026-05-03

  - deadline_id: proparco-fisea-plus-rolling
    issuing_body: Proparco
    country: FR
    kind: rolling_application
    title: Proparco FISEA+ — Africa investment-fund facility (rolling)
    deadline_date: null
    recurring: rolling
    why_it_matters: |
      AFD/Proparco's EUR 210m facility for Africa-focused investment
      funds, with EUR 21m TA budget. "FISEA+ may support initiatives
      that can benefit from junior tranches in addition to senior
      tranches" — explicitly catalytic for emerging managers in
      Priority Poor Countries and West Africa. Old /carte-des-projets
      URL now 404s; canonical FISEA+ page replaces it.
    public_source_url: https://www.proparco.fr/en/fisea-accelerating-capital-mobilization-impact-investment-funds-africa
    last_verified_at: 2026-05-03

  # ---------- DFI board / investment-committee public calendars ----------

  - deadline_id: gcf-board-b45-2026
    issuing_body: Green Climate Fund
    country: KR
    kind: board_meeting
    title: GCF Board Meeting B.45 — Dushanbe
    deadline_date: 2026-06-29
    recurring: quarterly
    next_occurrence: 2026-10-26
    why_it_matters: |
      GCF funding proposals (FPs) are approved at Board meetings. If
      targeting GCF as anchor LP, your proposal must be in the board
      package ~8 weeks before the meeting. B.45 confirmed: 29 June-2 July
      2026 (Dushanbe, Tajikistan). B.46 follows 26-29 October 2026
      (Songdo). Re-confirmed 2026-05-03 via the GCF/B.43/15 dates-and-
      venues decision document; the live /boardroom/meetings page still
      ends at B.44 (March 2026).
    # 2026-05-03: re-sourced to GCF/B.43/15 decision doc because the live
    # /boardroom/meetings page has not been updated past B.44. Decision
    # doc is canonical primary source for upcoming board dates.
    public_source_url: https://www.greenclimate.fund/document/gcf-b43-15
    last_verified_at: 2026-05-03

  - deadline_id: ifc-board-quarterly
    issuing_body: International Finance Corporation
    country: US
    kind: board_meeting
    title: IFC Board / Committee meetings — public disclosures
    deadline_date: null
    recurring: quarterly
    why_it_matters: |
      IFC projects (including LP commitments to funds) are disclosed via
      the SPI project page prior to consideration by IFC's Board of
      Directors. Source quote: "Investments are disclosed prior to
      consideration by IFC's Board of Directors, and advisory projects
      are disclosed following project approval." Watch this feed for
      INGO-GP precedents advancing.
    public_source_url: https://disclosures.ifc.org/
    last_verified_at: 2026-05-03

  - deadline_id: dfc-board-quarterly
    issuing_body: U.S. International Development Finance Corporation
    country: US
    kind: board_meeting
    title: DFC Board of Directors meetings (quarterly)
    deadline_date: null
    recurring: quarterly
    why_it_matters: |
      DFC's quarterly board meetings approve headline transactions
      including fund LP commitments. Board agenda is published ~2 weeks
      in advance with prospective commitments; watch for INGO-GP
      signals. Confirmed 2026 dates: 21 January (passed/cancelled per
      notice), 20 February (passed). Q2/Q3/Q4 2026 schedule still not
      published as of 2026-04-25 — DFC publishes quarter-by-quarter.
    public_source_url: https://www.dfc.gov/who-we-are/our-people/board-directors
    last_verified_at: 2026-05-03

  # ---------- ILPA / IRIS+ / IFC PS / OPIM template revisions ----------

