  # ---------- Active-discovery additions (since 2026-01-01) ----------

  - deadline_id: ilpa-edci-2026-cycle
    issuing_body: Institutional Limited Partners Association (ILPA) / EDCI
    country: US
    kind: regulator_filing
    title: ILPA ESG Data Convergence Initiative — annual reporting cycle
    deadline_date: null
    recurring: annual
    next_occurrence: null
    why_it_matters: |
      EDCI is the dominant ESG-data standard for private-fund LPs;
      participating GPs report annually on a standardized template.
      The 30 April 2026 cycle (live source quote on /metrics/ as of
      2026-05-03: "The next data submission deadline is April 30, 2026")
      closed 3 days before this refresh. Annual cadence holds — historic
      submission has been late April — but EDCI has not yet published
      the 2027 cycle date, so next_occurrence is left null per the
      "no-guess" honesty rule. 2026 cycle added a new cybersecurity
      metric and an optional Commercial Outcomes sheet. INGO-GP funds
      with institutional LPs in the cap table (DFIs especially) will
      face EDCI questions; first-time GPs commonly miss this.
    public_source_url: https://www.esgdc.org/metrics/
    last_verified_at: 2026-05-03

  - deadline_id: ec-sfdr-2-proposal-2025
    issuing_body: European Commission / DG FISMA
    country: EU
    kind: template_revision
    title: SFDR 2.0 — European Commission legislative proposal (Nov 2025)
    deadline_date: null
    recurring: one_off
    next_occurrence: null
    why_it_matters: |
      On 20 November 2025, the European Commission published a proposal
      to amend SFDR — the "SFDR 2.0" review. Proposed: simplified
      disclosures, new product categories (transition finance, ESG basic,
      sustainable), repeal of current RTS, removal of certain entity-level
      obligations. Co-decision in Parliament + Council expected in 2026;
      18-month entry-into-force pegs implementation to ~2028. EU-domiciled
      INGO funds (Cordaid IM, Triple Jump, BlueOrchard, Incofin) MUST
      track legislative process; an LPA written to the current SFDR will
      need re-papering. This entry distinct from sfdr-technical-standards-
      watch (rolling) — this is the specific Nov 2025 legislative proposal
      to track through 2026.
