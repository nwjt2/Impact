  - deadline_id: opim-signatory-verification-biennial
    issuing_body: Operating Principles for Impact Management
    country: US
    kind: template_revision
    title: Operating Principles for Impact Management — independent verification cycle
    deadline_date: null
    recurring: biennial
    why_it_matters: |
      OPIM signatories are expected to publish an independent verification
      of their alignment at least every two years. Source quote:
      "Signatories must also conduct regular independent verifications
      affirming the alignment of their impact management systems with
      the Impact Principles." Cadence is signatory-specific (pegged to
      each signatory's own disclosure anniversary); no industry-wide
      date. Budget for the verification cost and cycle.
    public_source_url: https://www.impactprinciples.org/signatories-reporting
    last_verified_at: 2026-05-03

  - deadline_id: sfdr-technical-standards-watch
    issuing_body: European Commission / ESMA
    country: EU
    kind: template_revision
    title: SFDR Regulatory Technical Standards — revision watch
    deadline_date: null
    recurring: rolling
    why_it_matters: |
      SFDR RTS changes trigger re-papering for Article 8/9 impact funds
      marketed in the EU. As of 2026-04-25, the EC SFDR page lists a
      legislative proposal of 20 November 2025: "Proposal for a revision
      of the Sustainable Finance Disclosures Regulation (SFDR)." This
      is the most material SFDR signal since the 2022 RTS adoption —
      EU-domiciled INGO funds should be tracking the legislative process
      monthly. No new RTS adopted yet as of verification date.
    public_source_url: https://finance.ec.europa.eu/sustainable-finance/disclosures/sustainability-related-disclosure-financial-services-sector_en
    last_verified_at: 2026-05-03

  # ---------- Regulator filings (INGO-to-fund-manager specific) ----------

  - deadline_id: uk-charity-commission-annual-return
    issuing_body: UK Charity Commission
    country: GB
    kind: regulator_filing
    title: UK Charity Annual Return (10 months post financial year-end)
    deadline_date: null
    recurring: annual
    why_it_matters: |
      UK INGOs spinning up a fund must disclose investments and related-
      party transactions in the Annual Return. Misfiling around impact-
      investment allocations (particularly out-of-charitable-object
      investments) draws CC attention. Source quote: "You must submit
      your annual return within 10 months of the end of your financial
      year." Per-charity deadline — varies by FYE.
    public_source_url: https://www.gov.uk/guidance/prepare-a-charity-annual-return
    last_verified_at: 2026-05-03

  - deadline_id: uk-cc-investment-policy-notification
    issuing_body: UK Charity Commission
    country: GB
    kind: regulator_filing
    title: UK Charity Commission — investment policy (CC14 guidance)
    deadline_date: null
    recurring: rolling
    why_it_matters: |
      CC14 (Charities and Investment Matters) governs what UK charities
      can invest in. Most recent substantial update: 1 August 2023
      (redesigned to reflect Charities Act 2022). Spinning up or
      committing to an impact fund should be reflected in the charity's
      stated investment policy; trustees carry fiduciary exposure if not.
    public_source_url: https://www.gov.uk/government/publications/charities-and-investment-matters-a-guide-for-trustees-cc14
    last_verified_at: 2026-05-03

  - deadline_id: irs-form-990-t-ubit
    issuing_body: US Internal Revenue Service (Exempt Organizations)
    country: US
    kind: regulator_filing
    title: US Form 990-T (UBIT) — fund-generated UBTI (calendar-year filers)
    deadline_date: 2026-05-15
    recurring: annual
    why_it_matters: |
      US 501(c)(3) INGOs whose impact fund generates UBTI (e.g. from
      debt-financed income in fund structures) must file 990-T. Source
      quote (live 2026-05-03 on Instructions for Form 990-T (2025)):
      Form 990-T is due "by the 15th day of the 5th month following the
      end of the tax year." Calendar-year filers: 15 May 2026 (12 days
      out as of refresh). Extensions via Form 8868 available (6 months
      → 15 Nov 2026). Many INGOs miss this on their first fund-investment
      year. Non-Dec FYE INGOs should apply their own offset.
    # 2026-05-03: re-sourced from /forms-pubs/about-form-990-t (page no
    # longer states the deadline) to /instructions/i990t which still
    # carries the explicit "15th day of the 5th month" language.
    public_source_url: https://www.irs.gov/instructions/i990t
    last_verified_at: 2026-05-03

  - deadline_id: sec-form-d-filing
    issuing_body: US Securities and Exchange Commission
    country: US
    kind: regulator_filing
    title: SEC Form D (Reg D Rule 506) — 15 days after first sale
    deadline_date: null
    recurring: rolling
    why_it_matters: |
      US private funds relying on Reg D must file Form D within 15 days
      of the first sale. Source quote: "An issuer must file Form D
      within 15 days after the first sale of securities in an offering
      relying on Rule 506(b), Rule 506(c) or Rule 504." INGO fund teams
      not accustomed to private-placement rules sometimes miss this;
      filing late is normally curable but creates audit exposure. (SEC
      September 2024 enforcement action settled charges against multiple
      entities for failing to timely file Form D — penalty risk is real.)
      URL updated to the current /resources-small-businesses/exempt-
      offerings/filing-form-d-notice page.
    public_source_url: https://www.sec.gov/resources-small-businesses/exempt-offerings/filing-form-d-notice
    last_verified_at: 2026-05-03

  - deadline_id: sec-form-adv-annual-amendment
    issuing_body: US Securities and Exchange Commission
    country: US
    kind: regulator_filing
    title: SEC Form ADV — annual amendment (Dec-FYE filers)
    deadline_date: null
    recurring: annual
    next_occurrence: 2027-03-31
    why_it_matters: |
      RIAs and ERAs (Exempt Reporting Advisers) must file the annual ADV
      amendment within 90 days of FYE. Source quote: "Each adviser, once
      its SEC registration is effective, must file an annual updating
      amendment within 90 days after the close of its fiscal year."
      Calendar-year filers: 31 March each year. INGO fund-affiliated
      advisers usually qualify as ERAs; the deadline still applies. 2026
      Dec-FYE cycle (31 March 2026) has passed; next_occurrence tracks
      the 2027 cycle. URL updated to the IARD electronic-filing page.
    public_source_url: https://www.sec.gov/about/divisions-offices/division-investment-management/electronic-filing-investment-advisers-iard
    last_verified_at: 2026-05-03

  - deadline_id: afm-aifmd-registration
    issuing_body: Dutch Authority for the Financial Markets (AFM)
    country: NL
    kind: regulator_filing
    title: AIFMD registration / notification (NL)
    deadline_date: null
    recurring: rolling
    why_it_matters: |
      Dutch-domiciled or Dutch-marketed INGO funds fall under AIFMD.
      Registration vs full licensing depends on fund size (EUR 100m
      with leverage / EUR 500m closed-ended, no leverage thresholds for
      light-regime registration). Cordaid IM and Triple Jump are
      precedent NL AIFMs. Old /en/sector/themas/aifmd URL now 404s;
      canonical AIFM hub at /en/sector/beleggingsinstellingen/aifm.
    public_source_url: https://www.afm.nl/en/sector/beleggingsinstellingen/aifm
    last_verified_at: 2026-05-03

  - deadline_id: lux-cssf-aifm-authorisation
    issuing_body: Luxembourg CSSF
    country: LU
    kind: regulator_filing
    title: CSSF — AIFM authorisation
    deadline_date: null
    recurring: rolling
    why_it_matters: |
      Luxembourg remains the default EU domicile for INGO-sponsored
      funds (BlueOrchard, Triodos, Incofin all use LU vehicles). Source
      quote: "Any company intending to act as AIFM shall be authorised
      by the CSSF beforehand." CSSF authorisation and passporting
      timelines should be in the INGO fund team's legal workstream from
      day one. Old /en/investment-funds/ URL now 404s; replaced with
      the /en/authorisation-aifm/ canonical page.
    public_source_url: https://www.cssf.lu/en/authorisation-aifm/
    last_verified_at: 2026-05-03

