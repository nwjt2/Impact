# Corporate LP registry — operating corporates (consumer / industrial /
# pharma / tech / retail / financial-services) committing to peer impact
# funds, typically tied to a supply-chain or brand initiative.
#
# Source of truth for the /corporates/ page. Hand-curated.
#
# Honest-null discipline:
#   - Corporates almost never publish a stated impact thesis at the
#     fund-LP level. Most LP commitments are tied to a specific
#     ESG / supply-chain / brand programme rather than a standing
#     allocation. Expect ~all rich fields null at first publication.
#   - The corresponding corporate foundation (e.g. MetLife Foundation,
#     Mastercard Foundation) is tracked SEPARATELY in
#     content/foundation_lps.yml — corporate balance sheet ≠ corporate
#     foundation endowment. Do not collapse.
#   - known_ingo_gp_commits is empty until each commit is independently
#     traced to a public source.
#
# category enum:
#   consumer             Consumer-products firm (Starbucks, Gap, Reckitt, Niagara)
#   industrial           Industrial / chemicals (DuPont, Ecolab)
#   pharma               Pharma / health (Merck, Royal Philips)
#   tech                 Technology / digital (PayPal, The Mills Fabrica)
#   financial_services   Insurer / payments / financial-services corp (Mastercard, MetLife, Prudential, Mercantil Colpatria)

